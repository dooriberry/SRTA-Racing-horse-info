<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>마방 관리</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --ink: #262626;
    --ink-soft: #8e8e8e;
    --line: #dbdbdb;
    --accent: #0095f6;
    --accent-soft: #e5f3ff;
    --ok-bg: #f0f0f0;
    --ok-ink: #737373;
    --warn-bg: #fff3dc;
    --warn-ink: #a36a00;
    --due-bg: #ffe9e8;
    --due-ink: #ed4956;
    --info-bg: #e5f3ff;
    --info-ink: #0077cc;
    --fresh-bg: #e3f5e9;
    --fresh-ink: #1f8a4c;
    --story-alert: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000; --card: #0e0e0e; --ink: #f5f5f5; --ink-soft: #a8a8a8;
      --line: #262626; --accent: #0095f6; --accent-soft: #062c44;
      --ok-bg: #1c1c1c; --ok-ink: #a8a8a8;
      --warn-bg: #2b2000; --warn-ink: #ffb84d;
      --due-bg: #2e0f0d; --due-ink: #ff6b62;
      --info-bg: #04263d; --info-ink: #4db5ff;
      --fresh-bg: #0e2b1a; --fresh-ink: #4cc27e;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
      "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Roboto, sans-serif;
    line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 48px; }

  /* 상단 바 — 인스타 헤더 느낌 */
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--card); border-bottom: 1px solid var(--line);
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1.35rem; font-weight: 800; margin: 0; letter-spacing: -0.03em; }
  .head-right { display: flex; align-items: center; gap: 4px; }
  .icon-btn {
    background: none; border: none; border-radius: 50%;
    width: 38px; height: 38px; font-size: 1.15rem; color: var(--ink);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { background: var(--ok-bg); }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); }
  .sync-info {
    font-size: 0.72rem; color: var(--ink-soft); text-align: center;
    padding: 6px 16px 0; font-variant-numeric: tabular-nums; min-height: 1.4em;
  }

  /* 스토리 줄 — 조 선택 */
  .stories {
    display: flex; gap: 14px; overflow-x: auto; padding: 12px 16px 4px;
    scrollbar-width: none;
  }
  .stories::-webkit-scrollbar { display: none; }
  .story {
    background: none; border: none; padding: 0; font: inherit; color: inherit;
    cursor: pointer; display: flex; flex-direction: column; align-items: center;
    gap: 5px; flex: 0 0 auto; width: 72px;
  }
  .story:focus-visible { outline: 2px solid var(--accent); border-radius: 12px; }
  .story .ringwrap { position: relative; display: block; }
  .story .ring {
    display: flex; width: 66px; height: 66px; border-radius: 50%; padding: 3px;
    background: var(--line);
  }
  .story.alert .ring { background: var(--story-alert); }
  .story.active .ring { background: var(--accent); }
  .story .avatar {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--card); border: 2px solid var(--card);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700; letter-spacing: -0.02em;
  }
  .story .badge {
    position: absolute; top: -2px; right: -2px;
    background: #ed4956; color: #fff; font-size: 0.68rem; font-weight: 700;
    min-width: 19px; height: 19px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center; padding: 0 5px;
    border: 2px solid var(--bg);
  }
  .story .label {
    font-size: 0.72rem; color: var(--ink-soft); max-width: 72px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .story.active .label { color: var(--ink); font-weight: 700; }

  .feed-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 10px 16px 6px;
  }
  .feed-title { font-size: 1.02rem; font-weight: 800; margin: 0; }
  .feed-sort { font-size: 0.72rem; color: var(--ink-soft); }

  /* 장제 기간 필터 버튼 */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 16px 10px; }
  .fbtn {
    font: inherit; font-size: 0.78rem; font-weight: 700; padding: 6px 12px;
    border-radius: 999px; border: 1px solid var(--line); cursor: pointer;
    background: var(--card); color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
  }
  .fbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .fbtn.fresh { background: var(--fresh-bg); color: var(--fresh-ink); border-color: transparent; }
  .fbtn.warn { background: var(--warn-bg); color: var(--warn-ink); border-color: transparent; }
  .fbtn.due { background: var(--due-bg); color: var(--due-ink); border-color: transparent; }
  .fbtn.on { outline: 2px solid currentColor; outline-offset: -1px; }
  .fbtn.all.on { background: var(--ink); color: var(--card); border-color: var(--ink); outline: none; }

  .notice {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; font-size: 0.83rem; color: var(--ink-soft); margin: 8px 16px;
  }
  .notice.error { border-color: var(--due-ink); color: var(--due-ink); }

  /* 피드 카드 */
  .horse-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    margin: 0 16px 12px; overflow: hidden;
  }
  .horse-head {
    width: 100%; background: none; border: none; font: inherit; color: inherit;
    text-align: left; padding: 12px 14px; cursor: pointer;
    display: flex; flex-direction: column; gap: 9px;
  }
  .horse-head:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .horse-top { display: flex; align-items: center; gap: 10px; }
  .horse-avatar {
    width: 40px; height: 40px; border-radius: 50%; flex: 0 0 auto;
    background: var(--ok-bg); color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 700;
  }
  .horse-id { min-width: 0; }
  .horse-name { font-size: 0.98rem; font-weight: 700; line-height: 1.25; }
  .horse-sub { font-size: 0.75rem; color: var(--ink-soft); }
  .horse-weight { margin-left: auto; font-size: 0.95rem; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .horse-weight small { font-weight: 400; color: var(--ink-soft); }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 999px;
    background: var(--ok-bg); color: var(--ok-ink);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .chip.warn { background: var(--warn-bg); color: var(--warn-ink); }
  .chip.due { background: var(--due-bg); color: var(--due-ink); }
  .chip.race { background: var(--accent-soft); color: var(--accent); }
  .chip.info { background: var(--info-bg); color: var(--info-ink); }

  .edit-panel { border-top: 1px solid var(--line); padding: 14px; display: grid; gap: 10px; }
  .edit-detail { font-size: 0.82rem; color: var(--ink-soft); display: grid; gap: 2px; }
  .field { display: grid; gap: 4px; }
  .field label { font-size: 0.75rem; font-weight: 600; color: var(--ink-soft); }
  .field input {
    font: inherit; font-variant-numeric: tabular-nums; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 10px; background: var(--bg); color: var(--ink); width: 100%;
  }
  .field input:focus-visible { outline: 2px solid var(--accent); border-color: var(--accent); }
  .btn-row { display: flex; gap: 8px; margin-top: 2px; }
  .btn {
    font: inherit; font-weight: 700; font-size: 0.88rem; padding: 9px 18px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--card); color: var(--ink); cursor: pointer;
  }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.block { width: 100%; }

  /* 설정 화면 */
  .setup { padding: 4px 16px; }
  .section-label {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-soft); margin: 18px 2px 8px;
  }
  .setup-list { display: grid; gap: 8px; }
  .check-item {
    display: flex; align-items: center; gap: 10px; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px; cursor: pointer;
  }
  .check-item input { width: 18px; height: 18px; accent-color: var(--accent); }
  .check-item .cnt { margin-left: auto; font-size: 0.8rem; color: var(--ink-soft); }
  .radio-row { display: flex; gap: 8px; }
  .radio-row .check-item { flex: 1; justify-content: center; }
  .radio-row .check-item.on { border-color: var(--accent); background: var(--accent-soft); font-weight: 700; }

  .loading { text-align: center; color: var(--ink-soft); padding: 34px 16px; font-size: 0.9rem; }

  footer {
    margin: 26px 16px 0; padding-top: 13px; border-top: 1px solid var(--line);
    font-size: 0.75rem; color: var(--ink-soft); display: grid; gap: 6px;
  }
  footer .legend { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>마방 관리</h1>
    <div class="head-right">
      <button class="icon-btn" id="refresh-btn" aria-label="데이터 새로고침" title="새로고침">&#x21bb;</button>
      <button class="icon-btn" id="setup-btn" aria-label="설정" title="설정">&#x2699;&#xfe0e;</button>
    </div>
  </header>
  <div class="sync-info" id="sync-info"></div>
  <main id="view"><div class="loading">불러오는 중…</div></main>
  <footer>
    <div class="legend">
      기준: <span class="chip warn">장제 3주↑·정치 6개월↑</span>
      <span class="chip due">장제 30일↑</span>
      <span class="chip info">정치 6개월 미만</span>
    </div>
    <div>경주일·체중·장제·정타는 한국마사회 공공데이터에서 자동으로 가져옵니다. 정치일자는 진료 기록(최근 2개월분)으로 자동 표시되며, 그 이전 것은 직접 입력해주세요.</div>
  </footer>
</div>

<script src="config.js"></script>
<script>
(function () {
  "use strict";
  // 인증키는 코드에 넣지 않는다: config.js(로컬 전용, gitignore) 또는
  // 앱 설정 화면에서 한 번 입력받아 이 기기(localStorage)에만 저장한다.
  var KEY_STORE = "mabang-key";
  function getKey() {
    if (typeof window.MABANG_KEY === "string" && window.MABANG_KEY) return window.MABANG_KEY;
    try { return localStorage.getItem(KEY_STORE) || ""; } catch (e) { return ""; }
  }
  var BASE = "https://apis.data.go.kr/B551015";
  var CFG_KEY = "mabang-config-v1";
  var CACHE_KEY = "mabang-cache-v4";
  var MANUAL_KEY = "mabang-manual-v1";
  var WEIGHT_KEY = "mabang-weight-v1";
  var CACHE_TTL = 12 * 3600 * 1000;   // 12시간 지나면 자동 갱신
  var SHOE_LOOKBACK_DAYS = 60;        // 장제 기록 조회 범위
  var MEETS = { "1": "서울", "2": "제주", "3": "부산경남" };

  var config = readJson(CFG_KEY);     // {meet, trainers:[...]}
  var cache = readJson(CACHE_KEY);    // {fetchedAt, meet, teams, trainersAll, resultMap, shoeMap, clinicMap, weekSet, clinicOk}
  var manual = readJson(MANUAL_KEY) || {};   // {hrNo: {teeth}}
  var weights = readJson(WEIGHT_KEY) || {};  // {hrNo: {w, date}}

  var currentTeam = null;
  var openHorse = null;
  var shoeFilter = null;   // null=전체, 'fresh'=7일 이내, 'warn'=3주 경과, 'due'=30일 경과
  var lastError = "";
  var syncing = false;
  var progress = 0;
  var setupMode = false;
  var view = document.getElementById("view");

  function readJson(k) {
    try { var r = localStorage.getItem(k); return r ? JSON.parse(r) : null; } catch (e) { return null; }
  }
  function writeJson(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function ymd(date) {
    return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
  }
  function numToIso(n) {
    var s = String(n);
    if (!/^\d{8}$/.test(s)) return null;
    return s.slice(0, 4) + "-" + s.slice(4, 6) + "-" + s.slice(6, 8);
  }
  function fmt(iso) { return iso ? iso.replace(/-/g, ".") : "—"; }
  function daysAgo(iso) {
    if (!iso) return null;
    var then = new Date(iso + "T00:00:00");
    var now = new Date(); now.setHours(0, 0, 0, 0);
    return Math.round((now - then) / 86400000);
  }
  // 장제: 3주(21일) 이상 노랑, 30일 이상 빨강
  function shoeStatus(d) { if (d === null) return "due"; if (d >= 30) return "due"; if (d >= 21) return "warn"; return ""; }
  // 정치: 6개월(180일) 이상 노랑, 그 미만은 파랑
  function teethStatus(d) { if (d === null) return ""; if (d >= 180) return "warn"; return "info"; }

  // ---------- API ----------
  function bumpProgress() {
    progress++;
    if (!cache) setLoading("마사회 데이터를 불러오는 중… (" + progress + "건 완료, 30초~1분 정도 걸립니다)");
    else syncLabel();
  }
  function apiGet(path, params) {
    var q = "serviceKey=" + getKey() + "&_type=json";
    for (var k in params) q += "&" + k + "=" + encodeURIComponent(params[k]);
    return fetch(BASE + path + "?" + q).then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }).then(function (j) {
      var h = j && j.response && j.response.header;
      if (!h || h.resultCode !== "00") throw new Error((h && h.resultMsg) || "API 오류");
      bumpProgress();
      return j.response.body;
    });
  }
  function items(body) {
    if (!body || !body.items || !body.items.item) return [];
    var it = body.items.item;
    return Array.isArray(it) ? it : [it];
  }
  // 1페이지를 받아 전체 건수를 확인한 뒤 나머지 페이지는 동시에 요청
  function fetchAllPages(path, params, perPage, maxPages) {
    function pageParams(n) { return Object.assign({}, params, { numOfRows: perPage, pageNo: n }); }
    return apiGet(path, pageParams(1)).then(function (body) {
      var first = items(body);
      var total = Number(body.totalCount) || 0;
      var pages = Math.min(Math.ceil(total / perPage) || 1, maxPages);
      if (pages <= 1) return first;
      var rest = [];
      for (var n = 2; n <= pages; n++) rest.push(apiGet(path, pageParams(n)).then(items));
      return Promise.all(rest).then(function (chunks) {
        return chunks.reduce(function (acc, c) { return acc.concat(c); }, first);
      });
    });
  }

  function refreshData(force) {
    if (!config || !getKey()) return Promise.resolve();
    if (syncing) return Promise.resolve();
    var fresh = cache && cache.meet === config.meet && (Date.now() - cache.fetchedAt) < CACHE_TTL;
    if (fresh && !force) return Promise.resolve();

    syncing = true; progress = 0;
    if (!cache) setLoading("마사회 데이터를 불러오는 중… (30초~1분 정도 걸립니다)");
    else syncLabel();

    var meet = config.meet;
    var today = new Date();
    var from = new Date(); from.setDate(from.getDate() - SHOE_LOOKBACK_DAYS);

    var roster = fetchAllPages("/API8_2/raceHorseInfo_2", { meet: meet }, 2000, 3);
    var results = fetchAllPages("/API15_2/raceHorseResult_2", { meet: meet }, 2000, 4);
    var shoes = fetchAllPages("/API191_1/HorseShoe_1",
      { meet: meet, shoe_date_fr: ymd(from), shoe_date_to: ymd(today) }, 2000, 4);
    var week = fetchAllPages("/trcweekentry_1/gettrcweekentry_1", { meet: meet }, 1000, 2)
      .catch(function () { return []; });
    // 진료 API는 한 번에 최대 1000건까지만 응답함. 전체 보관분이 약 2개월치라 넉넉히 받는다.
    var clinic = fetchAllPages("/API16_1/raceHorseClinic_1", { meet: meet }, 1000, 15)
      .then(function (list) { return { ok: true, list: list }; })
      .catch(function () { return { ok: false, list: [] }; });

    return Promise.all([roster, results, shoes, week, clinic]).then(function (r) {
      var teams = {};        // trName -> [{hrNo, name, rank}]
      r[0].forEach(function (h) {
        (teams[h.trName] = teams[h.trName] || []).push({ hrNo: h.hrNo, name: h.hrName, rank: h.rank });
      });
      var trainersAll = Object.keys(teams).sort(function (a, b) { return a.localeCompare(b, "ko"); })
        .map(function (t) { return { name: t, count: teams[t].length }; });

      var resultMap = {};    // hrNo -> {race}
      r[1].forEach(function (h) {
        var race = numToIso(h.recentRcDate);
        resultMap[h.hrNo] = { race: race };
        var w = Number(h.recentWgHr) || 0;
        if (w > 0) weights[h.hrNo] = { w: w, date: race };
      });
      writeJson(WEIGHT_KEY, weights);

      // 본장제(장제·삭제)와 정타를 구분해서 각각 최신 날짜를 보관.
      // 색깔 판정은 본장제 기준, 정타는 참고용으로 별도 표시한다.
      var shoeMap = {};      // hrNo -> {shoe: {date, type}, jeonta: date}
      r[2].forEach(function (s) {
        var iso = numToIso(s.shoeDate);
        if (!iso) return;
        var n = String(s.amt1Name || "");
        var e = shoeMap[s.hrNo] = shoeMap[s.hrNo] || { shoe: null, jeonta: null };
        if (n.indexOf("정타") >= 0) {
          if (!e.jeonta || e.jeonta < iso) e.jeonta = iso;
        } else {
          var type = n.indexOf("삭제") >= 0 ? "삭제" : "장제";
          if (!e.shoe || e.shoe.date < iso) e.shoe = { date: iso, type: type };
        }
      });

      var weekSet = {};
      r[3].forEach(function (w) { weekSet[w.hrNo] = true; });

      var clinicMap = {};    // hrNo -> 최근 '정치' 진료일
      r[4].list.forEach(function (c) {
        var txt = String(c.illName1 || "") + " " + String(c.illName2 || "");
        if (txt.indexOf("정치") < 0) return;
        var iso = numToIso(c.clinicDate);
        if (!iso) return;
        if (!clinicMap[c.hrNo] || clinicMap[c.hrNo] < iso) clinicMap[c.hrNo] = iso;
      });

      // 진료 기록의 소속조(part) 번호로 조교사 → 조번호를 알아낸다 (가장 많이 나온 번호 채택)
      var hrToTr = {};
      r[0].forEach(function (h) { hrToTr[h.hrNo] = h.trName; });
      var partTally = {};
      r[4].list.forEach(function (c) {
        var tr = hrToTr[c.hrNo];
        var p = c.part;
        if (!tr || p == null || p === "-" || p === "") return;
        (partTally[tr] = partTally[tr] || {})[p] = (partTally[tr][p] || 0) + 1;
      });
      var partMap = {};      // trName -> 조번호
      Object.keys(partTally).forEach(function (tr) {
        var best = null, bn = 0;
        Object.keys(partTally[tr]).forEach(function (p) {
          if (partTally[tr][p] > bn) { bn = partTally[tr][p]; best = p; }
        });
        partMap[tr] = best;
      });

      cache = {
        fetchedAt: Date.now(), meet: meet, teams: teams, trainersAll: trainersAll,
        resultMap: resultMap, shoeMap: shoeMap, clinicMap: clinicMap, partMap: partMap,
        weekSet: weekSet, clinicOk: r[4].ok
      };
      writeJson(CACHE_KEY, cache);
      lastError = "";
    }).catch(function (e) {
      lastError = "데이터를 불러오지 못했습니다: " + e.message + (cache ? " (이전 데이터를 표시합니다)" : "");
    }).then(function () {
      syncing = false;
    });
  }

  // ---------- 파생 데이터 ----------
  function horseTeeth(hrNo) {
    var m = manual[hrNo] && manual[hrNo].teeth;
    var c = cache && cache.clinicMap[hrNo];
    if (m && c) return m > c ? m : c;
    return m || c || null;
  }
  function horseView(h) {
    var res = (cache && cache.resultMap[h.hrNo]) || {};
    var w = weights[h.hrNo] ? weights[h.hrNo].w : null;
    var sm = (cache && cache.shoeMap[h.hrNo]) || {};
    var shoe = sm.shoe || null;
    // 정타는 마지막 본장제 이후에 있었던 것만 의미가 있음
    var jeonta = sm.jeonta && (!shoe || sm.jeonta > shoe.date) ? sm.jeonta : null;
    return {
      hrNo: h.hrNo, name: h.name, rank: h.rank, weight: w,
      race: res.race || null,
      shoe: shoe, jeonta: jeonta,
      teeth: horseTeeth(h.hrNo),
      thisWeek: !!(cache && cache.weekSet[h.hrNo])
    };
  }
  function needsCheck(v) {
    var s = shoeStatus(v.shoe ? daysAgo(v.shoe.date) : null);
    return s === "due" || s === "warn" || teethStatus(daysAgo(v.teeth)) === "warn";
  }
  // 조 표시명: 진료 데이터에서 알아낸 조번호가 있으면 "53조", 없으면 조교사명
  function teamNo(tr) {
    var p = cache && cache.partMap && cache.partMap[tr];
    return p ? p + "조" : null;
  }
  function teamLabel(tr) { return teamNo(tr) || tr + " 조"; }

  // ---------- 화면 ----------
  function setLoading(msg) {
    view.innerHTML = '<div class="loading">' + esc(msg) + "</div>";
  }
  function syncLabel() {
    var el = document.getElementById("sync-info");
    var txt = "";
    if (cache) {
      var d = new Date(cache.fetchedAt);
      txt = MEETS[cache.meet] + " · 데이터 기준 " + (d.getMonth() + 1) + "/" + d.getDate() + " " +
        String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
    }
    if (syncing) txt += (txt ? " · " : "") + "갱신 중…";
    el.textContent = txt;
  }
  function noticeHtml() {
    var html = "";
    if (lastError) html += '<div class="notice error">' + esc(lastError) + "</div>";
    if (cache && !cache.clinicOk) {
      html += '<div class="notice">진료정보 API가 아직 연결되지 않아 정치일자는 직접 입력해야 합니다. ' +
        "공공데이터포털에서 ‘마필진료 정보’ 활용신청 후 새로고침하면 자동으로 연동됩니다.</div>";
    }
    return html;
  }

  function renderSetup() {
    setupMode = true;
    var meet = (config && config.meet) || "1";
    var key = getKey();
    var html = '<div class="setup">';

    // 인증키 섹션은 평소에 숨김 — 키가 전혀 없을 때만 입력창을 보여준다 (비상용)
    if (!key) {
      html += '<div class="section-label">공공데이터포털 인증키</div>';
      html += '<div class="notice" style="margin:8px 0">마사회 데이터를 불러오려면 공공데이터포털(data.go.kr)에서 발급받은 ' +
        "일반 인증키를 한 번만 입력해주세요. 이 기기에만 저장됩니다.</div>" +
        '<div class="field"><input id="f-key" type="text" placeholder="인증키 붙여넣기" autocomplete="off"></div>' +
        '<div style="height:10px"></div><button class="btn primary block" id="key-save">인증키 저장</button></div>';
      view.innerHTML = html;
      document.getElementById("key-save").addEventListener("click", function () {
        var v = document.getElementById("f-key").value.trim();
        if (v.length < 20) { alert("인증키가 너무 짧습니다. 공공데이터포털 마이페이지의 일반 인증키를 그대로 붙여넣어 주세요."); return; }
        try { localStorage.setItem(KEY_STORE, v); } catch (e) {}
        refreshData(true).then(function () { if (setupMode) renderSetup(); });
        renderSetup();
      });
      return;
    }
    html += '<div class="section-label">경마장</div><div class="radio-row">';
    Object.keys(MEETS).forEach(function (m) {
      html += '<div class="check-item' + (m === meet ? " on" : "") + '" data-meet="' + m + '" role="button" tabindex="0">' + MEETS[m] + "</div>";
    });
    html += "</div>";

    var ready = cache && cache.meet === meet;
    if (!ready) {
      html += '<div class="loading">조 목록을 불러오는 중입니다… (30초~1분)</div>';
    } else {
      var selected = (config && config.trainers) || [];
      html += '<div class="section-label">내가 관리하는 조 선택 (여러 개 가능)</div><div class="setup-list">';
      cache.trainersAll.forEach(function (t) {
        var on = selected.indexOf(t.name) >= 0;
        var no = teamNo(t.name);
        html += '<label class="check-item"><input type="checkbox" value="' + esc(t.name) + '"' + (on ? " checked" : "") + ">" +
          "<span>" + (no ? esc(no) + " · " : "") + esc(t.name) + '</span><span class="cnt">' + t.count + "마리</span></label>";
      });
      html += '</div><div style="height:14px"></div><button class="btn primary block" id="setup-save">저장</button>';
    }
    html += "</div>";
    view.innerHTML = html;

    view.querySelectorAll("[data-meet]").forEach(function (el) {
      function pick() {
        var m = el.getAttribute("data-meet");
        if (config.meet !== m) {
          config.meet = m;
          config.trainers = [];
          writeJson(CFG_KEY, config);
          refreshData(true).then(function () { if (setupMode) renderSetup(); });
        }
        renderSetup();
      }
      el.addEventListener("click", pick);
      el.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(); } });
    });

    var saveBtn = document.getElementById("setup-save");
    if (saveBtn) saveBtn.addEventListener("click", function () {
      var picked = [];
      view.querySelectorAll('input[type="checkbox"]:checked').forEach(function (c) { picked.push(c.value); });
      if (!picked.length) { alert("조를 하나 이상 선택해주세요."); return; }
      config.trainers = picked;
      writeJson(CFG_KEY, config);
      setupMode = false;
      currentTeam = null;
      render();
    });
  }

  function chip(label, iso, statusFn) {
    var d = daysAgo(iso);
    var cls = statusFn ? statusFn(d) : "";
    var text = label + " " + fmt(iso) + (d !== null ? " (" + d + "일 전)" : "");
    return '<span class="chip ' + cls + '">' + esc(text) + "</span>";
  }

  // 스토리 줄 + 피드 (인스타그램 스타일)
  function renderFeed() {
    var trainers = config.trainers || [];
    if (currentTeam === null || trainers.indexOf(currentTeam) < 0) currentTeam = trainers[0] || null;

    var html = noticeHtml();

    // 조 스토리
    html += '<div class="stories">';
    trainers.forEach(function (tr) {
      var horses = ((cache && cache.teams[tr]) || []).map(horseView);
      var alerts = 0;
      horses.forEach(function (v) { if (needsCheck(v)) alerts++; });
      var cls = "story" + (tr === currentTeam ? " active" : "") + (alerts ? " alert" : "");
      html += '<button class="' + cls + '" data-team="' + esc(tr) + '">' +
        '<span class="ringwrap"><span class="ring"><span class="avatar">' + esc(teamNo(tr) || tr) + "</span></span>" +
        (alerts ? '<span class="badge">' + alerts + "</span>" : "") + "</span>" +
        '<span class="label">' + (teamNo(tr) ? esc(tr) : horses.length + "마리") + "</span></button>";
    });
    html += '<button class="story" id="story-setup">' +
      '<span class="ringwrap"><span class="ring"><span class="avatar">＋</span></span></span>' +
      '<span class="label">조 관리</span></button>';
    html += "</div>";

    // 피드
    var list = ((cache && cache.teams[currentTeam]) || []).map(horseView);
    // 직전 경주일이 최신인 말부터, 경주 기록 없는 말은 뒤로
    list.sort(function (a, b) {
      var ra = a.race || "", rb = b.race || "";
      if (ra !== rb) return rb < ra ? -1 : 1;
      return a.name.localeCompare(b.name, "ko");
    });

    // 장제 경과일 구간: 7일 이내 / 3주 경과(21~29일) / 30일 경과(기록 없음 포함)
    function shoeBucket(v) {
      var d = v.shoe ? daysAgo(v.shoe.date) : null;
      if (d === null || d >= 30) return "due";
      if (d >= 21) return "warn";
      if (d <= 7) return "fresh";
      return "";
    }
    var counts = { fresh: 0, warn: 0, due: 0 };
    list.forEach(function (v) { var b = shoeBucket(v); if (counts[b] !== undefined) counts[b]++; });
    var shown = shoeFilter ? list.filter(function (v) { return shoeBucket(v) === shoeFilter; }) : list;

    html += '<div class="feed-head"><h2 class="feed-title">' + esc(teamLabel(currentTeam || "")) + " · " + shown.length + "마리</h2>" +
      '<span class="feed-sort">최근 경주 순</span></div>';

    html += '<div class="filter-row">' +
      '<button class="fbtn all' + (!shoeFilter ? " on" : "") + '" data-filter="">전체 ' + list.length + "</button>" +
      '<button class="fbtn fresh' + (shoeFilter === "fresh" ? " on" : "") + '" data-filter="fresh">장제 7일 이내 ' + counts.fresh + "</button>" +
      '<button class="fbtn warn' + (shoeFilter === "warn" ? " on" : "") + '" data-filter="warn">3주 경과 ' + counts.warn + "</button>" +
      '<button class="fbtn due' + (shoeFilter === "due" ? " on" : "") + '" data-filter="due">30일 경과 ' + counts.due + "</button>" +
      "</div>";

    if (shoeFilter && !shown.length) {
      html += '<div class="notice">해당 기간의 말이 없습니다.</div>';
    }
    list = shown;

    list.forEach(function (v) {
      var shoeChip;
      if (v.shoe) shoeChip = chip(v.shoe.type, v.shoe.date, shoeStatus);
      else shoeChip = '<span class="chip due">장제 ' + SHOE_LOOKBACK_DAYS + "일↑</span>";
      if (v.jeonta) shoeChip += chip("정타", v.jeonta, null);

      html += '<div class="horse-card"><button class="horse-head" data-horse="' + esc(v.hrNo) + '">' +
        '<div class="horse-top">' +
        '<span class="horse-avatar">' + esc(v.name.charAt(0)) + "</span>" +
        '<span class="horse-id"><div class="horse-name">' + esc(v.name) + "</div>" +
        '<div class="horse-sub">' + esc(v.rank || "") + (v.thisWeek ? " · 금주 출전" : "") + "</div></span>" +
        '<span class="horse-weight">' + (v.weight ? v.weight + "<small> kg</small>" : '<small>체중 —</small>') + "</span>" +
        "</div>" +
        '<div class="chip-row">' +
        '<span class="chip race">경주 ' + esc(fmt(v.race)) +
          (daysAgo(v.race) !== null ? " (" + daysAgo(v.race) + "일 전)" : "") + "</span>" +
        shoeChip +
        chip("정치", v.teeth, teethStatus) +
        "</div></button>";

      if (openHorse === v.hrNo) {
        html += '<div class="edit-panel">' +
          '<div class="edit-detail">' +
          "<span>마번 " + esc(v.hrNo) + (v.rank ? " · 등급 " + esc(v.rank) : "") + "</span>" +
          (v.weight && weights[v.hrNo] && weights[v.hrNo].date ?
            "<span>체중 " + v.weight + "kg (" + esc(fmt(weights[v.hrNo].date)) + " 계측)</span>" : "") +
          "</div>" +
          '<div class="field"><label for="f-teeth">정치일자 (직접 입력)</label>' +
          '<input id="f-teeth" type="date" value="' + esc((manual[v.hrNo] && manual[v.hrNo].teeth) || "") + '"></div>' +
          '<div class="btn-row"><button class="btn primary" id="save-horse">저장</button>' +
          '<button class="btn" id="close-edit">닫기</button></div></div>';
      }
      html += "</div>";
    });

    view.innerHTML = html;

    view.querySelectorAll(".story[data-team]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        currentTeam = btn.getAttribute("data-team");
        openHorse = null;
        render();
      });
    });
    view.querySelectorAll(".fbtn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var f = btn.getAttribute("data-filter") || null;
        shoeFilter = shoeFilter === f ? null : f;   // 같은 버튼을 다시 누르면 전체로
        openHorse = null;
        render();
      });
    });
    var setupStory = document.getElementById("story-setup");
    if (setupStory) setupStory.addEventListener("click", function () {
      openHorse = null; renderSetup();
    });

    view.querySelectorAll(".horse-head").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var no = btn.getAttribute("data-horse");
        openHorse = openHorse === no ? null : no;
        render();
      });
    });
    var saveBtn = document.getElementById("save-horse");
    if (saveBtn) saveBtn.addEventListener("click", function () {
      var val = document.getElementById("f-teeth").value;
      if (val) manual[openHorse] = { teeth: val };
      else delete manual[openHorse];
      writeJson(MANUAL_KEY, manual);
      openHorse = null; render();
    });
    var closeBtn = document.getElementById("close-edit");
    if (closeBtn) closeBtn.addEventListener("click", function () { openHorse = null; render(); });
  }

  function render() {
    syncLabel();
    if (setupMode) { renderSetup(); return; }
    if (!config || !config.trainers || !config.trainers.length) { renderSetup(); return; }
    if (!cache) { setLoading("마사회 데이터를 불러오는 중… (30초~1분 정도 걸립니다)"); return; }
    renderFeed();
  }

  document.getElementById("refresh-btn").addEventListener("click", function () {
    refreshData(true).then(function () {
      if (openHorse === null) render(); else syncLabel();
    });
    syncLabel();
  });
  document.getElementById("setup-btn").addEventListener("click", function () {
    openHorse = null; renderSetup();
  });

  // 시작: 캐시가 있으면 즉시 표시하고 뒤에서 갱신
  if (!config) { config = { meet: "1", trainers: [] }; writeJson(CFG_KEY, config); }
  render();
  refreshData(false).then(function () {
    if (openHorse === null) render(); else syncLabel();
  });
})();
</script>
</body>
</html>
